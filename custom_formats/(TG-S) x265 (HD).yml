name: (TG-S) x265 (HD)
description: 'This blocks all 720/1080p (HD) releases that are encoded in x265.

  In your quality profile use the following score for this Custom Format: `{{ sonarr[''cf''][''x265-hd''][''trash_scores''][''default'']
  }}`

  !!! Danger "If you have also added [{{ sonarr[''cf''][''x265-no-hdrdv''][''name'']
  }}](/Sonarr/sonarr-collection-of-custom-formats/#x265-no-hdrdv) to your Sonarr,<br>then
  one of them should be scored as `0` in your quality profile."'
tags:
- TRaSH
- Sonarr Only
conditions:
- name: x265/HEVC
  type: release_title
  required: true
  negate: false
  pattern: x265/HEVC
- name: Not 2160p
  type: resolution
  required: true
  negate: true
  resolution: 2160p
tests: []
