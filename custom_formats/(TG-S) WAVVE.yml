name: (TG-S) WAVVE
description: 'Wavve is a South Korean subscription streaming service operated by SK
  Telecom, offering TV dramas, variety shows, films, documentaries, animations, and
  sports. It was launched in September 2019 as a joint venture between SK Telecom
  and South Korea''s three major broadcasters KBS, MBC, and SBS. Wavve has received
  approval to merge with fellow Korean streaming service TVING.

