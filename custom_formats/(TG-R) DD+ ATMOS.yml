name: (TG-R) DD+ ATMOS
description: 'DD+ Atmos (Dolby Digital Plus with Atmos) is the lossy version of Dolby
  Atmos, used primarily by streaming services. Streaming services encode Dolby Atmos
  tracks in Dolby Digital Plus, a lossy format, meaning some audio detail is removed
  to reduce file size and save bandwidth. DD+ Atmos is what major streaming platforms
  use for their Atmos support, including Netflix, Disney+, and Amazon Prime Video.
  While it still delivers the immersive 3D sound experience of Atmos, it does so with
  some compression, resulting in less detail and dynamic range compared to lossless
  Atmos formats.

  For more information, visit the [Dolby Digital Plus Wikipedia page](https://en.wikipedia.org/wiki/Dolby_Digital_Plus).'
