name: (TG-S) Repack3
description: A Repack 3 is a third re-release of a scene or P2P release, issued to
  fix errors or quality issues found in the original release and two previous repacks.
  Each repack is published by the original release group to correct problems such
  as audio sync issues, missing content, corrupt files, or incorrect encoding settings.
  A Repack 3 indicates that two prior attempts to fix the release were made before
  this corrected version was issued.
tags:
- TRaSH
- Sonarr Only
conditions:
- name: Repack/Proper 3 or REAL.REAL.PROPER/REPACK
  type: release_title
  required: true
  negate: false
  pattern: Repack/Proper 3 or REAL.REAL.PROPER/REPACK
tests: []
