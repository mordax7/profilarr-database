name: (TG-R) Masters of Cinema
description: 'Masters of Cinema is a line of DVD and Blu-ray releases published by
  Eureka Entertainment. Due to its uniformly branded, spine-numbered packaging and
  the standard inclusion of booklets and analysis by film historians, it is often
  regarded as the UK equivalent of The Criterion Collection. The series began in 2004
  and focuses on classic and world cinema, featuring carefully restored films. All
  releases come with extensive booklets and a range of bonus features.

  For more information, visit the [Masters of Cinema Wikipedia page](https://en.wikipedia.org/wiki/Masters_of_Cinema).'
