name: (TG-R) FLAC
description: 'FLAC (Free Lossless Audio Codec) is an open audio format similar to
  MP3, but lossless, meaning audio is compressed without any loss in quality. FLAC
  is designed to reduce the amount of storage space needed for digital audio while
  retaining all the original information. It is free and open, meaning its specification
  is publicly available and its reference implementation is open source. FLAC can
  achieve a compression of around 30-50% compared to uncompressed audio, without sacrificing
  any audio quality. It is widely used for music archiving and high-quality audio
  playback.

  For more information, visit the [FLAC Wikipedia page](https://en.wikipedia.org/wiki/FLAC).'
