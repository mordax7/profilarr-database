name: (TG-S) DD
description: 'Dolby Digital, also known as AC-3, is a lossy audio compression format
  developed by Dolby Laboratories. It was first used to provide digital sound in cinemas
  and has since become a standard for TV broadcasts, DVDs, Blu-ray discs, and game
  consoles. It supports up to 5.1 channels of surround sound and uses a lossy compression
  algorithm, discarding audio information that is less perceptible to the human ear
  in order to reduce file size. It was one of the most widely used audio formats in
  home theater and broadcast media.

  For more information, visit the [Dolby Digital Wikipedia page](https://en.wikipedia.org/wiki/Dolby_Digital).'
