description: 'Discovery+ is an American subscription streaming service owned by Warner
  Bros. Discovery, focused on factual and non-fiction programming drawn from Discovery''s
  major channel brands, including HGTV, Food Network, TLC, and Investigation Discovery,
  as well as original series and content from CNN. It launched in the US on January
  4, 2021. It is the streaming home for food, home, travel, true crime, and paranormal
  content, with over 70,000 episodes available. It remains a standalone service alongside
  Max in the US.

  For more information, visit the [Discovery+ Wikipedia page](https://en.wikipedia.org/wiki/Discovery%2B).'
