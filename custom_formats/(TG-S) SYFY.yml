name: (TG-S) SYFY
description: 'Syfy is an American pay TV channel owned by Versant, originally launched
  in 1992 as the Sci-Fi Channel before being rebranded as Syfy in 2009. It specializes
  in science fiction, fantasy, and horror programming. Syfy''s streaming home is Peacock,
  NBCUniversal''s streaming service, where current and classic Syfy original series
  are available, including Resident Alien, The Ark, and Farscape. A TV provider login
  is required to watch live content through the Syfy app.

  For more information, visit the [Syfy Wikipedia page](https://en.wikipedia.org/wiki/Syfy).'
