name: (TG-R) DTS X
description: 'DTS:X is an object-based 3D surround sound format developed by DTS,
  designed to place sounds anywhere in a three-dimensional space around the listener.
  It is carried by DTS-HD Master Audio, a lossless audio codec commonly used on Blu-ray
  discs, supporting up to 7.1 channels plus additional audio objects at 96 kHz/24-bit
  quality. DTS:X supports flexible speaker placement, allowing audio to be remapped
  to any speaker configuration, with up to 32 speaker locations.

  For more information, visit the [DTS:X Wikipedia page](https://en.wikipedia.org/wiki/DTS:X).'
