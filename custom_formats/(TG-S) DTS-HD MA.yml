name: (TG-S) DTS-HD MA
description: 'DTS-HD Master Audio (DTS-HD MA) is a lossless audio codec developed
  by DTS, commonly used for surround sound on Blu-ray discs. It supports variable
  bit rates up to 24.5 Mbit/s and up to 7.1 channels of audio at 96 kHz/24-bit quality.
  It uses a hybrid approach, with a lossy DTS core for backward compatibility on older
  devices, plus a lossless extension that reconstructs the full audio signal on supported
  hardware. By 2010, it had become the dominant lossless audio format on Blu-ray,
  and it also serves as the carrier format for DTS:X.

  For more information, visit the [DTS-HD Master Audio Wikipedia page](https://en.wikipedia.org/wiki/DTS-HD_Master_Audio).'
