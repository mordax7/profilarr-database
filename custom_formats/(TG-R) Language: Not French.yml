name: '(TG-R) Language: Not French'
description: This custom format is used to identify and avoid releases that do not
  contain a French audio track. When applied, it will flag any release where French
  is not included as an available audio language, helping ensure that only releases
  with French audio are downloaded.
tags:
- TRaSH
- Radarr Only
conditions:
- name: Not French Language
  type: language
  required: false
  negate: true
  language: french
  exceptLanguage: false
tests: []
