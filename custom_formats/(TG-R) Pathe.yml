  \ in 2011, one of the first of its kind before major international streaming platforms\
  \ arrived. Rather than a monthly subscription, it works as a pay-per-view service\
  \ where users rent or buy individual films on demand. It offers a wide range of\
  \ movies, from the latest releases to classic titles, and new films often become\
  \ available shortly after their cinema run.\nFor more information, visit the [Path\xE9\
  \ Wikipedia page](https://en.wikipedia.org/wiki/Path%C3%A9)."
