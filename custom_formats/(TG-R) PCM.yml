name: (TG-R) PCM
description: 'PCM (Pulse Code Modulation) is an uncompressed, lossless audio format
  that accurately captures the full dynamics and details of the original sound without
  any loss. It works by sampling the analog audio signal at regular intervals and
  converting each sample into a digital number, preserving the audio waveform precisely.
  PCM is widely used in CDs, DVDs, and digital broadcasting, and is a common choice
  when audio quality is the top priority. Because it is uncompressed, PCM files are
  larger than formats like FLAC or MP3, but deliver the purest possible audio reproduction.

  For more information, visit the [PCM Wikipedia page](https://en.wikipedia.org/wiki/Pulse-code_modulation).'
