name: (TG-S) DTS-HD HRA
description: 'DTS-HD High Resolution Audio (DTS-HD HRA) is a high-resolution but lossy
  audio format developed by DTS. It offers a higher bit rate and more audio detail
  than standard DTS, with support for up to 8 channels and data rates of up to 6 Mbit/s
  on Blu-ray. Unlike DTS-HD Master Audio, which is lossless, DTS-HD HRA uses lossy
  compression, meaning some audio information is discarded during encoding. It is
  backward compatible with standard DTS decoders and is sometimes used on Blu-ray
  discs where disc space is a concern, as a lower-footprint alternative to DTS-HD
  MA.

  For more information, visit the [DTS-HD Master Audio Wikipedia page](https://en.wikipedia.org/wiki/DTS-HD_Master_Audio).'
