name: (TG-S) 4OD
description: 'Channel 4 is a video-on-demand service from Channel Four Television
  Corporation, free of charge for most content and funded by advertising. It launched
  on November 16, 2006, as 4oD (4 on Demand), was renamed All 4 in 2015, and rebranded
  again as Channel 4 in April 2023, becoming the first UK broadcaster to adopt one
  brand identity across its digital and linear channels. It offers programmes from
  Channel 4, E4, More4, Film4, and E4 Extra, alongside exclusive content, with a 30-day
  catch-up window and a large archive of programming. An ad-free subscription tier
  is available under the name Channel 4+. It is only available in the UK and Ireland.

  For more information, visit the [Channel 4 VoD Wikipedia page](https://en.wikipedia.org/wiki/Channel_4_(VoD_service)).'
