name: (TG-R) AAC
description: 'AAC (Advanced Audio Coding) is a lossy digital audio compression format,
  originally designed as a successor to MP3. It became standardized in 1997 and is
  widely used in cell phones, game consoles, digital radio, and streaming platforms.
  AAC delivers superior sound quality compared to MP3 at the same bit rate, and has
  been widely adopted as the default audio format by major platforms including YouTube,
  iPhone, iPod, iPad, and Apple iTunes. Like all lossy formats, some audio data is
  permanently removed during compression, though the difference is rarely noticeable
  to most listeners.

  For more information, visit the [AAC Wikipedia page](https://en.wikipedia.org/wiki/Advanced_Audio_Coding).'
