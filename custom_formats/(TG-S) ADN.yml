name: (TG-S) ADN
description: 'ADN (Animation Digital Network) is the largest French streaming platform
  dedicated to animation, offering a wide range of anime genres including action,
  adventure, romance, and comedy, alongside cult titles such as One Piece, Dragon
  Ball, Naruto, and Attack on Titan. The service is available for free or through
  a premium plan that removes ads and provides access to simulcast series available
  shortly after their Japanese broadcast. It is primarily aimed at French-speaking
  audiences in Europe.

  No English Wikipedia page is currently available, but you can find more information
  on the [ADN official website](https://animationdigitalnetwork.com).'
