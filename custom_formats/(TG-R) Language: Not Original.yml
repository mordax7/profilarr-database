name: '(TG-R) Language: Not Original'
description: This custom format is used to identify and avoid releases that do not
  contain the original language audio track of the film or TV show. When applied,
  it will flag any release where the original language is not included as an available
  audio option, helping ensure that only releases with the original language audio
  are downloaded.
tags:
- TRaSH
- Radarr Only
conditions:
- name: Not Original Language
  type: language
  required: false
  negate: true
  language: original
  exceptLanguage: false
tests: []
