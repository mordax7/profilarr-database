name: (TG-R) WiTH AD
description: "Audio Description (AD) is an extra narration track that describes key\
  \ visual details \u2014 such as scenery, costumes, and actions \u2014 for blind\
  \ or visually impaired viewers. It makes TV and film content more accessible by\
  \ explaining what cannot be heard in the main audio.\nSome releases include Audio\
  \ Description, marked as `WITH AD` or `AD`. Note: this is not the same as advertisements.\n\
  For more information, visit the [Audio Description Wikipedia page](https://en.wikipedia.org/wiki/Audio_description)."
tags:
- TRaSH
- Radarr Only
conditions:
- name: Audio Description
  type: release_title
  required: true
  negate: false
  pattern: Audio Description
