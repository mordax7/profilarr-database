name: (TG-S) ABEMA
description: 'ABEMA is a Japanese streaming service owned by CyberAgent and TV Asahi,
  launched in April 2016. It operates primarily as a free, ad-supported platform offering
  around 25 live channels, covering news, anime, original dramas, reality dating shows,
  and sports, with an optional paid premium tier for on-demand content. It is primarily
  available in Japan and is well known for its live sports broadcasting, including
  the 2022 FIFA World Cup.

  For more information, visit the [ABEMA Wikipedia page](https://en.wikipedia.org/wiki/Abema).'
