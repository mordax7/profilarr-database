name: (TG-S) x266
description: "x266 is the next generation open-source VVC/H.266 compliant encoder,\
  \ built on top of the industry-standard x265 HEVC encoder. The VVC/H.266 standard\
  \ was developed with the goal of achieving twice the coding efficiency of HEVC,\
  \ and supports High Dynamic Range (HDR), Wide Color Gamut (WCG), and 360\xB0 video.\
  \ x266 is still actively being developed by MulticoreWare, and very little is currently\
  \ known about its final implementation.\nNo respectable release group is currently\
  \ using x266. It is best to avoid this codec for now to prevent compatibility issues.\n\
  For more information, visit the [Versatile Video Coding Wikipedia page](https://en.wikipedia.org/wiki/Versatile_Video_Coding)."
tags:
- TRaSH
- Sonarr Only
