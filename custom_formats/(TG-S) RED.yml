name: (TG-S) RED
description: 'YouTube Red was launched on October 28, 2015, offering ad-free access
  to all YouTube videos, offline playback, background playback on mobile, and access
  to exclusive YouTube Originals programming produced in collaboration with popular
  creators. In May 2018, YouTube Red was rebranded as YouTube Premium, which also
  bundled access to YouTube Music, Google''s music streaming service. YouTube Premium
  now has over 125 million subscribers worldwide.

  For more information, visit the [YouTube Premium Wikipedia page](https://en.wikipedia.org/wiki/YouTube_Premium).'
