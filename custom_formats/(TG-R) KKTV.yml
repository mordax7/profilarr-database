name: (TG-R) KKTV
description: 'KKTV is a Taiwanese streaming service offering dramas, films, and anime
  from Taiwan, Japan, South Korea, Thailand, and Hong Kong, as well as original series.
  It was founded in 2016 and is based in Taipei, Taiwan. It is especially known for
  offering the latest Japanese dramas, with some released within hours or days of
  their premiere in Japan. In November 2025, KKTV merged with LINE TV.

  For more information, visit the [KKTV Wikipedia page](https://en.wikipedia.org/wiki/KKTV).'
