name: (TG-R) VP9
description: 'VP9 is an open-source, royalty-free video codec developed by Google,
  released in June 2013. It reduces streaming bitrate by 30-50% compared to H.264
  at equivalent visual quality and is widely used on platforms such as YouTube, which
  encodes all 4K video in VP9 by default. While VP9 is efficient for web streaming,
  it is primarily a streaming codec and is not used for physical media remuxes or
  scene releases, where AVC (H.264) and HEVC (H.265) remain the standard choices.

  There have been reported playback and transcoding issues with VP9 content. No respectable
  release group is currently using it. It is best to avoid this codec for now to prevent
  compatibility issues.

  For more information, visit the [VP9 Wikipedia page](https://en.wikipedia.org/wiki/VP9).'
