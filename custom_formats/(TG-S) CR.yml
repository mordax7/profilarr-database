name: (TG-S) CR
description: 'Crunchyroll is an American subscription streaming service owned by Sony,
  dedicated to anime and manga. It offers a large library of anime series and films,
  with simulcast episodes available at or near the same time as their Japanese broadcast,
  in both subtitled and dubbed formats. It is free to watch with ads, with an optional
  paid subscription for ad-free viewing. It is available in over 200 countries and
  is one of the most popular anime streaming services in the world.

  For more information, visit the [Crunchyroll Wikipedia page](https://en.wikipedia.org/wiki/Crunchyroll).'
