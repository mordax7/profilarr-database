name: (TG-S) MyTVSuper
description: 'myTV SUPER is a subscription-based streaming service launched in April
  2016 by MyTV Super Limited, a subsidiary of Television Broadcasts Limited (TVB)
  in Hong Kong. It offers TVB dramas, variety shows, movies, anime, live sports, and
  horse racing content, with some content supporting up to 4K resolution. The service
  is primarily available in Hong Kong and Macau.

