name: (TG-R) VIU
description: 'Viu (pronounced "view") is a Hong Kong-based subscription streaming
  service owned by PCCW Media Group, launched in October 2015. It delivers Asian content
  across different genres, including Korean dramas, movies, and variety shows, with
  local language subtitles, as well as original productions under the Viu Originals
  label. It is available in 16 markets across Asia, the Middle East, and Africa, and
  operates on both a free ad-supported tier and a paid subscription tier.

  For more information, visit the [Viu Wikipedia page](https://en.wikipedia.org/wiki/Viu_(streaming_service)).'
