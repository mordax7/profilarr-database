name: (TG-S) MPEG2
description: 'MPEG-2 is a standard for the generic coding of moving pictures and associated
  audio information, using a combination of lossy video and audio compression to allow
  storage and transmission of video using available storage media and bandwidth. Developed
  in the 1990s by the Moving Picture Experts Group, it was the standard codec for
  DVDs and remains in use for over-the-air digital, satellite, and cable broadcasts.
  While it was a major step forward in its time, it has largely been replaced by more
  modern and efficient codecs such as AVC (H.264) and HEVC (H.265), which deliver
  better quality at lower bitrates.

  For more information, visit the [MPEG-2 Wikipedia page](https://en.wikipedia.org/wiki/MPEG-2).'
