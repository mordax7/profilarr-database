name: (TG-S) ITVX
description: 'ITVX is a British ad-supported streaming service operated by ITV plc,
  launched in December 2022. It offers original ITV content, live streams of ITV channels,
  and exclusive and licensed programming. It is free to watch with ads, with an optional
  paid Premium tier that removes ads and includes additional content. It is only available
  to viewers in the United Kingdom.

  For more information, visit the [ITVX Wikipedia page](https://en.wikipedia.org/wiki/ITVX).'
