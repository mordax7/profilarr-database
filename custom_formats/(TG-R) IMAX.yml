name: (TG-R) IMAX
description: 'IMAX, which stands for Image Maximum, is a proprietary motion picture
  projection format developed by the Canadian company IMAX Corporation in the late
  1960s. IMAX theaters are known for their massive screens, significantly larger than
  those in standard cinemas, providing a more immersive viewing experience. IMAX uses
  an expanded aspect ratio of 1.43:1, much taller and squarer than the typical widescreen
  ratio of 2.39:1, capturing significantly more image detail compared to standard
  cinema formats. Films shot natively with IMAX cameras, such as those by Christopher
  Nolan, use the full 1.43:1 frame, showing more picture at the top and bottom of
  the screen compared to standard releases.

  For more information, visit the [IMAX Wikipedia page](https://en.wikipedia.org/wiki/IMAX).'
