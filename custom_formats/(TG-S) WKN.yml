description: 'Wakanim was a French anime subscription streaming service launched on
  February 27, 2009, specializing in simulcasting Japanese anime for European audiences.
  It was also the first platform in Europe to offer DRM-free anime downloads. Owned
  by Sony''s Crunchyroll, the service was discontinued on November 3, 2023, with its
  content and library absorbed into Crunchyroll.

