name: (TG-S) SHO
description: 'Showtime is an American premium pay TV network owned by Paramount Skydance,
  launched on July 1, 1976. It is known for producing original TV series, independent
  films, and documentaries. In June 2023, Showtime was fully merged into Paramount+,
  with all its content now available under the combined "Paramount+ with Showtime"
  subscription plan. It is well known for hit series such as Billions, Homeland, Shameless,
  and Dexter.

  For more information, visit the [Showtime Wikipedia page](https://en.wikipedia.org/wiki/Showtime_(TV_network)).'
