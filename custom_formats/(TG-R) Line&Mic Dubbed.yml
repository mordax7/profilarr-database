name: (TG-R) Line&Mic Dubbed
description: A Line/Mic Dubbed release is a recording where the audio has been captured
  from a cinema screening, either through a microphone placed in the theater or via
  a direct line connection to the audio system. The audio quality is generally poor
  compared to official releases, as it may include background noise, audience sounds,
  or distortion. This type of audio is commonly associated with early cam or screener
  releases and is considered one of the lowest quality audio sources available.
tags:
