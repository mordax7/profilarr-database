name: (TG-R) 4K Remaster
description: 'A 4K remaster means the original film or video was scanned and digitally
  remastered at 4K resolution (3840x2160 pixels), improving image detail, color accuracy,
  and overall viewing quality. For older films originally shot on 35mm film, this
  process involves scanning the original film negative at 4K or higher resolution,
  followed by frame-by-frame digital cleanup, color correction, and damage repair.
  The result is a sharper, more detailed image with improved color that is better
  suited for modern 4K displays.

  A 4K remaster differs from a 4K upscale. A remaster goes back to the original film
  source for the highest possible quality, while an upscale simply increases the resolution
  of an existing digital version, often with less detail and clarity.

  For more information, visit the [Remaster Wikipedia page](https://en.wikipedia.org/wiki/Remaster).'
