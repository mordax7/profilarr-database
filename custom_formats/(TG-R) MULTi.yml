name: (TG-R) MULTi
description: 'A Multi release is a release that contains more than one audio language
  track. For example, a release labeled "Multi" may include English, French, Spanish,
  or other language tracks within the same file, allowing viewers to switch between
  languages during playback. The number and selection of included languages can vary
  depending on the source and the release group.

  Multi releases are common for content distributed across multiple regions, where
  different audiences require different language options. The presence of multiple
  audio tracks does not affect the video quality of the release.'
