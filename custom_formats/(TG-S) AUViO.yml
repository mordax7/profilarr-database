name: (TG-S) AUViO
description: 'Auvio is the French-language streaming platform of Belgium''s public
  broadcaster RTBF, offering live TV, radio broadcasts, and on-demand content including
  popular Belgian shows, international movies, documentaries, and major sports events
  such as Formula 1 and MotoGP. It is free to access and ad-free, requiring only a
  free account to watch, with an optional paid tier that unlocks a larger catalog
  of over 1,700 films. It is only available to viewers in Belgium.

  For more information, visit the [Auvio Wikipedia page](https://en.wikipedia.org/wiki/Auvio).'
