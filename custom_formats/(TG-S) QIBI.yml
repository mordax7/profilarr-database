name: (TG-S) QIBI
description: 'Quibi, short for "quick bites," was a mobile-only streaming service
  launched on April 6, 2020. It offered high-quality short-form content, with episodes
  of 10 minutes or less, covering scripted series, documentaries, news, and reality
  shows. Despite raising nearly $1.8 billion and featuring A-list talent, the platform
  shut down just six months after its launch, on October 21, 2020.

  For more information, visit the [Quibi Wikipedia page](https://en.wikipedia.org/wiki/Quibi).'
