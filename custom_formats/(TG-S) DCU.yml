name: (TG-S) DCU
description: 'DC Universe was an American subscription streaming service operated
  by DC Entertainment and Warner Bros. Digital Networks, launched on September 15,
  2018. It featured animated and live-action series based on DC Comics properties,
  a rotating back catalogue of DC Comics publications, and exclusive original shows
  such as Titans, Doom Patrol, Harley Quinn, and Young Justice. In January 2021, the
  video streaming service was shut down and relaunched as DC Universe Infinite, a
  digital comics-only service, with all original programming moving to HBO Max.

  For more information, visit the [DC Universe Wikipedia page](https://en.wikipedia.org/wiki/DC_Universe_(streaming_service)).'
