name: (TG-R) DTS-ES
description: 'DTS-ES (Extended Surround) is a lossy extension of the standard DTS
  5.1 format, launched in 2000. It adds a discrete center back surround channel between
  the two rear channels, creating a 6.1-channel soundstage and improving surround
  envelopment by filling in the gap at the back of the room. It comes in two versions:
  DTS-ES Discrete 6.1, which carries the rear center channel as a fully separate discrete
  channel, and DTS-ES Matrix 6.1, which derives the rear center channel from the existing
  surround channels for backward compatibility. It is commonly found on DVD releases.

  For more information, visit the [DTS-ES Wikipedia page](https://en.wikipedia.org/wiki/DTS-ES).'
