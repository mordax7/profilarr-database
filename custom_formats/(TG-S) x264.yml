name: (TG-S) x264
description: 'x264 is a free and open-source software library developed by VideoLAN
  for encoding video into the H.264/MPEG-4 AVC format, released under the GNU General
  Public License. It is the most widely deployed H.264/AVC encoder in the world, with
  over 80% of all videos on the internet estimated to be encoded using x264. x264
  is primarily used for 720p and 1080p encodes, and offers excellent direct-play support
  and broad compatibility across virtually all devices and media players.

  For more information, visit the [x264 Wikipedia page](https://en.wikipedia.org/wiki/X264).'
