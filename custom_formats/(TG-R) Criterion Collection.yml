name: (TG-R) Criterion Collection
description: 'The Criterion Collection is a home entertainment distribution company
  focused on licensing, restoring, and distributing important classic and contemporary
  films. A sister company of arthouse film distributor Janus Films, Criterion serves
  film scholars, cinephiles, and public and academic libraries. It has produced and
  distributed more than 1,500 special editions across VHS, LaserDisc, DVD, Blu-ray,
  and Ultra HD Blu-ray formats, covering titles from over 600 directors across more
  than 50 countries. Releases are known for their high-quality restorations, detailed
  bonus features, scholarly essays, and director-approved transfers.

  For more information, visit the [Criterion Collection Wikipedia page](https://en.wikipedia.org/wiki/The_Criterion_Collection).'
