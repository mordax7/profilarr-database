name: (TG-S) B-Global
description: 'B-Global, also known as BiliBili International or BStation, is the international
  version of Bilibili, China''s popular anime and entertainment streaming platform.
  It is the top anime platform in Southeast Asia, offering over 2,000 licensed anime
  titles with multilingual subtitle support. It also features short dramas, donghua
  (Chinese animation), and user-created content. Most titles are primarily available
  in Southeast Asian countries.

  For more information, visit the [Bilibili Wikipedia page](https://en.wikipedia.org/wiki/Bilibili).'
