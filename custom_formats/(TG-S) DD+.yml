name: (TG-S) DD+
description: 'Dolby Digital Plus, also known as Enhanced AC-3 and commonly abbreviated
  as DD+ or E-AC-3, is a digital audio compression format developed by Dolby Laboratories.
  It is a successor to Dolby Digital (AC-3), supporting a wider range of data rates
  and an increased channel count. It is a lossy format, meaning some audio detail
  is removed during compression, and it supports up to 7.1 channels of audio. Unlike
  DD+ Atmos, this version carries no 3D object-based audio data and is commonly used
  on streaming platforms and Blu-ray discs for standard surround sound delivery.

  For more information, visit the [Dolby Digital Plus Wikipedia page](https://en.wikipedia.org/wiki/Dolby_Digital_Plus).'
