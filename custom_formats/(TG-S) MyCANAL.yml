name: (TG-S) MyCANAL
description: 'myCANAL is the streaming platform of French broadcaster Canal+, launched
  in December 2013. It has since been rebranded as Canal+ and is a subsidiary of Canal+
  S.A. The service gives Canal+ subscribers live and on-demand access to all Canal+
  channels, including major sports rights such as the UEFA Champions League and the
  English Premier League. It is primarily available to subscribers in France and other
  Canal+ markets across Europe and Africa.

  For more information, visit the [Canal+ Wikipedia page](https://en.wikipedia.org/wiki/Canal%2B_(streaming_service)).'
