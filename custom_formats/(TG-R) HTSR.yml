name: (TG-R) HTSR
description: 'Disney+ Hotstar is a subscription streaming service owned by Disney
  Star (formerly Star India), originally launched in 2015 as Hotstar. Following Disney''s
  acquisition of 21st Century Fox in 2019, it was rebranded as Disney+ Hotstar in
  April 2020, adding content from Disney, Pixar, Marvel, Lucasfilm, and National Geographic.
  It operates in India, Indonesia, Malaysia, and Thailand, combining local content
  with the Disney+ library, and is the second largest streaming platform in the world
  by subscribers, behind only Netflix.

  For more information, visit the [Disney+ Hotstar Wikipedia page](https://en.wikipedia.org/wiki/Disney%2B_Hotstar).'
