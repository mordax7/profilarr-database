name: (TG-S) LINETV
description: 'LINE TV is a free, ad-supported streaming service owned by Japan-based
  LINE Corporation, operating mainly in Taiwan. It offers dramas, variety shows, movies,
  anime, and original content. It is especially popular for Taiwanese, Korean, and
  Chinese content. In November 2025, LINE TV announced a full merger with KKTV, combining
  both platforms'' content libraries to offer a wider range of Asian dramas and new
  features such as offline viewing and dual subtitles.

  For more information, visit the [LINE TV Wikipedia page](https://en.wikipedia.org/wiki/Line_TV).'
