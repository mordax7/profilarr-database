name: (TG-S) TrueHD
description: 'Dolby TrueHD is a 100% lossless audio format, meaning what you hear
  is bit-for-bit identical to the original master recording. It supports up to 7.1
  channels of high-definition audio at up to 192 kHz/24-bit quality, and is found
  primarily on Blu-ray discs. Unlike TrueHD Atmos, this version carries no 3D object-based
  audio data.

  For more information, visit the [Dolby TrueHD Wikipedia page](https://en.wikipedia.org/wiki/Dolby_TrueHD).'
