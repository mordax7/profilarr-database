name: (TG-S) NLZ
description: 'NLZiet is a Dutch subscription streaming service founded in 2014, combining
  content from major Dutch broadcasters including NPO, RTL, and Talpa into one platform.
  It offers both live TV and on-demand viewing, mostly ad-free, and is available across
  the EU. It is primarily aimed at Dutch-speaking viewers and is one of the most complete
  Dutch-language TV streaming services available.

  No English Wikipedia page is currently available, but you can find more information
  on the [NLZiet official website](https://www.nlziet.nl).'
