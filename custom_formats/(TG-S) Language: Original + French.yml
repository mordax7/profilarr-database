name: '(TG-S) Language: Original + French'
description: This custom format is used to identify releases that contain both the
  original language audio track and a French audio track. When applied, it helps ensure
  that only releases including both the original language and French audio are preferred,
  making it ideal for viewers who want access to both options in a single release.
tags:
- TRaSH
- Sonarr Only
conditions:
- name: Original Language
  type: language
  required: true
  negate: false
  language: original
  exceptLanguage: false
- name: French Language
  type: language
  required: true
  negate: false
  language: french
  exceptLanguage: false
- name: MULTi
  type: release_title
  required: true
  negate: false
  pattern: MULTi
tests: []
