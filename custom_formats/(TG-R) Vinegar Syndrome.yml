name: (TG-R) Vinegar Syndrome
description: 'Vinegar Syndrome is an American home video distribution company specializing
  in protecting and preserving genre films. It was founded in 2012 in Bridgeport,
  Connecticut, by Joe Rubin and Ryan Emerson. The company focuses on films produced
  primarily between the 1960s and 1980s, including horror, exploitation, and cult
  titles, many of which would otherwise be lost. Their in-house lab performs high-quality
  digital film restorations with the goal of bringing each film back to its originally
  intended theatrical quality. The company''s name refers to the acidic smell of deteriorating
  film, a constant reminder of the preservation work they do.

  For more information, visit the [Vinegar Syndrome Wikipedia page](https://en.wikipedia.org/wiki/Vinegar_Syndrome).'
