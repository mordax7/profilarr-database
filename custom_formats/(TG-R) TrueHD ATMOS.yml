name: (TG-R) TrueHD ATMOS
description: 'Dolby TrueHD Atmos is the lossless version of Dolby Atmos, found primarily
  on Blu-ray and 4K UHD discs. Dolby Atmos soundtracks consist of up to 128 individual
  audio objects mixed in a 3D soundfield, rendered during playback to the available
  speakers, including overhead ceiling speakers. On Blu-ray, the Atmos data is embedded
  as an extension within the TrueHD track to maintain backward compatibility. If a
  receiver does not support Atmos, it simply plays the audio as standard Dolby TrueHD
  instead. Unlike most audio formats, Dolby TrueHD is 100% lossless, meaning what
  you hear is bit-for-bit identical to the master recording.

  For more information, visit the [Dolby TrueHD Wikipedia page](https://en.wikipedia.org/wiki/Dolby_TrueHD).'
