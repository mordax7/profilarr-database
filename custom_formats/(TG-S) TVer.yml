name: (TG-S) TVer
description: 'TVer is a free, ad-supported Japanese streaming service launched in
  October 2015. It is a joint venture by Japan''s five major commercial TV networks
  Nippon TV, TV Asahi, TBS Television, TV Tokyo, and Fuji TV. It offers dramas, variety
  shows, anime, and documentaries, typically available for one week after their original
  broadcast. It is primarily available in Japan.

  For more information, visit the [TVer Wikipedia page](https://en.wikipedia.org/wiki/TVer_(streaming_service)).'
