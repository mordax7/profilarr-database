name: (TG-S) STAN
description: 'Stan is an Australian subscription streaming service launched on January
  26, 2015, and owned by Nine Entertainment. It offers movies, TV shows, and original
  productions, and is the fourth largest streaming service in Australia. Its library
  includes content from both local Australian productions and international titles,
  particularly from the US and UK. An optional Stan Sport add-on provides access to
  live sports, including tennis grand slams and the Olympics.

  For more information, visit the [Stan Wikipedia page](https://en.wikipedia.org/wiki/Stan_(streaming_service)).'
