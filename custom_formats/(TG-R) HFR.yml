name: (TG-R) HFR
description: 'High Frame Rate (HFR) refers to video content that runs at a higher
  frame rate than the typical 24 frames per second (fps) used in traditional cinema.
  HFR produces a much smoother, more detailed image compared to standard 24fps, and
  is especially useful for gaming, sports, and live streaming, where it can significantly
  reduce motion blur and latency. Common HFR frame rates include 48fps, 60fps, and
  120fps. While some viewers find HFR more immersive, others feel it gives footage
  an overly realistic or "soap opera" look compared to the traditional cinematic appearance
  of 24fps.

  For more information, visit the [High Frame Rate Wikipedia page](https://en.wikipedia.org/wiki/High_frame_rate).'
