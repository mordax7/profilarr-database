name: (TG-S) VRV
description: 'VRV (pronounced "verve") was an American streaming service launched
  in November 2016, bundling together anime, fantasy, educational, and gaming-related
  content aimed at fans of those genres. It was only available in the United States.
  In April 2023, VRV shut down and its content was merged into Crunchyroll.

  For more information, visit the [VRV Wikipedia page](https://en.wikipedia.org/wiki/VRV_(streaming_service)).'
