name: (TG-R) VDL
description: 'Videoland is a Dutch streaming service owned by RTL Nederland, originally
  founded in 1984 as a chain of video rental stores before moving to online streaming.
  It is the leading local streaming platform in the Netherlands, focusing on Dutch-language
  content, original productions, and programming from RTL Nederland''s TV channels.
  It is primarily available to viewers in the Netherlands.

  For more information, visit the [Videoland Wikipedia page](https://en.wikipedia.org/wiki/Videoland_(Netherlands)).'
