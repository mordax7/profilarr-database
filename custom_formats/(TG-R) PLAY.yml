name: (TG-R) PLAY
description: 'Google TV, previously known as Play Movies & TV, is Google''s digital
  platform for buying, renting, and browsing movies and TV shows. It brings together
  content from over 700,000 titles across multiple streaming apps into one place,
  with personalized recommendations based on your viewing history. It also allows
  users to purchase or rent the latest releases directly through the platform.

  For more information, visit the [Google TV Wikipedia page](https://en.wikipedia.org/wiki/Google_TV_(service)).'
