name: (TG-S) HIDIVE
description: 'HIDIVE is an American anime subscription streaming service owned by
  AMC Global Media, launched in June 2017 as a successor to Anime Network Online.
  It offers English subtitles and dubs, with exclusive access to first-run simulcasts
  of new anime at or near the same time as their Japanese broadcast. It is a strong
  alternative to Crunchyroll, known for its diverse library of both popular and hard-to-find
  anime titles, including select uncensored content.

  For more information, visit the [HIDIVE Wikipedia page](https://en.wikipedia.org/wiki/Hidive).'
