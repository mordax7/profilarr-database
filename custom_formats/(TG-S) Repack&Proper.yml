name: (TG-S) Repack&Proper
description: 'A Repack is a re-release of a file by the same release group, issued
  to fix a problem with the original release, such as a corrupted file, incorrect
  audio sync, or missing content. A Proper is a re-release issued by a different release
  group to correct or improve upon a flawed release from another group.

  Both Repack and Proper releases are considered higher quality than the original
  flawed release they replace, and should generally be preferred over the original
  when available.'
tags:
- TRaSH
- Sonarr Only
conditions:
- name: Repack/Proper/Rerip
  type: release_title
  required: true
  negate: false
  pattern: Repack/Proper/Rerip
- name: Not Higher Version Repack/Proper
  type: release_title
  required: true
  negate: true
  pattern: Not Higher Version Repack/Proper
tests: []
