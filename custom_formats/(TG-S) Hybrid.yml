name: (TG-S) Hybrid
description: 'A Hybrid release is a release that combines elements from more than
  one source to produce the best possible result. For example, the video track may
  come from one source, such as a Blu-ray disc, while the audio track, subtitles,
  or additional content come from a different source, such as a streaming service
  or a different regional release. This approach is used when no single source contains
  everything needed for the highest quality release, allowing the best available video
  and audio to be combined into one file.

  In general, top tier release groups always try to combine elements from more than
  one source to produce the best possible result. However, not all release groups
  mention that their release is a hybrid release.'
tags:
- TRaSH
- Sonarr Only
conditions:
- name: Hybrid
  type: release_title
  required: false
  negate: false
  pattern: Hybrid
- name: Not Hybrid Release Group
  type: release_group
  required: true
  negate: true
  pattern: Not Hybrid Release Group
- name: Remux
  type: source
  required: false
  negate: false
  source: bluray_raw
- name: Bluray
  type: source
  required: false
  negate: false
  source: bluray
