name: (TG-S) DTS
description: 'DTS (Digital Theater Systems) is a lossy multichannel audio codec developed
  to provide discrete surround sound channels for cinema and home use. It supports
  5.1 channels of surround sound and is a direct competitor to Dolby Digital, commonly
  found on DVDs and Blu-ray discs. Compared to Dolby Digital, DTS typically uses less
  compression and higher bit rates, up to 1.5 Mbps, which many consider to result
  in slightly better sound quality. It served as the foundation for later DTS formats,
  including DTS-ES, DTS-HD High Resolution Audio, DTS-HD Master Audio, and DTS:X.

  For more information, visit the [DTS Wikipedia page](https://en.wikipedia.org/wiki/DTS_(sound_system)).'
