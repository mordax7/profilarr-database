name: (TG-S) VC-1
description: 'VC-1 is a lossy video codec developed by Microsoft, commonly found on
  older Blu-ray discs and early HD video releases. While it was a popular choice in
  the early days of high-definition content, it has since been largely replaced by
  more modern codecs such as AVC (H.264) for 1080p and HEVC (H.265) for 2160p content.

  Many release groups re-encode older VC-1 content to AVC when a disc is also available
  in AVC, as AVC generally offers better compression and improved visual quality at
  lower bitrates, along with wider compatibility across modern playback devices.

  For more information, visit the [VC-1 Wikipedia page](https://en.wikipedia.org/wiki/VC-1).'
