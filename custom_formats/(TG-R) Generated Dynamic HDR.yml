name: (TG-R) Generated Dynamic HDR
description: 'A collection of groups known for generating their own dynamic HDR metadata,
  including Dolby Vision and/or HDR10+.

  This generated dynamic HDR metadata does not come from official retail sources,
  such as discs or streaming services, so it is generally undesirable because of the
  substantial effort required and the near-impossible task of reliably ensuring quality
  without manually reviewing each movie.'
