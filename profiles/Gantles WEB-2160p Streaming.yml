name: Gantles WEB-2160p Streaming
description: >-
  Remote-safe streaming 4K WEB-only profile with 7-tier language preference,
  smart Dolby Vision (HDR10 fallback required), and audio format optimization.

  Language preference (upgrade ladder — grabs first available, upgrades upward):
    1. Native + English + German — best, no further upgrade
    2. Native + English — upgrades if German appears
    3. Native + German — upgrades if English appears
    4. English + German — upgrades if Native appears
    5. English only — upgrades when German/Native appears
    6. Native only — upgrades when English/German appears
    7. German only — last resort, upgrades toward any better tier

  Remote streaming bitrate targets:
    - Preferred average bitrate: 12–18 Mbps
    - Soft maximum: 20 Mbps (150 MB/min)
    - Hard maximum: 25 Mbps (187.5 MB/min)
    - Formula: Mbps × 7.5 = MB/min
    - 4K file at ~15 Mbps (e.g. Emma. 2020, 13 GB / 2h) works remotely
    - 4K file at ~30 Mbps (e.g. LOTR, 49 GB / 4h) stutters remotely

  - Targets WEB-DL and WEBRip 2160p primarily (no Bluray, no Remux)
  - Falls back to WEB 1080p while waiting for 4K availability
  - Strongly prefers German DL (Dual Language: Original + German) releases
  - All language tiers are grabbable; system upgrades automatically
  - Prefers HDR (HDR10+ > HDR10 > HLG > SDR) at 4K
  - Smart Dolby Vision: accepts DV only with HDR10 fallback (safe for all devices)
  - Rejects DV without HDR10 fallback (causes playback issues)
  - Prefers EAC3/AC3 audio (streaming-friendly, low bitrate)
  - Penalizes TrueHD/DTS-HD MA/DTS:X/PCM (lossless audio = large files, transcode-prone)
  - Netflix-like streaming quality target
  - Average Movie Size: 8-20 GB
  - Average Episode Size: 3-8 GB
tags:
  - 2160p
  - WEB
  - German
  - HDR
  - Streaming
  - Remote Safe
upgradesAllowed: true
minCustomFormatScore: -15000
upgradeUntilScore: 35000
minScoreIncrement: 1

# ---------------------------------------------------------------------------
# Shared custom formats (applied to both Sonarr and Radarr)
# ---------------------------------------------------------------------------
custom_formats: []

# ---------------------------------------------------------------------------
# Sonarr-specific custom formats
# ---------------------------------------------------------------------------
custom_formats_sonarr:
  # --- Resolution boosters ---
  - name: (TG-S) 2160p
    score: 100
  - name: (TG-S) 1080p
    score: 50
  - name: (TG-S) 720p
    score: 5

  # --- HEVC / 10-bit preference ---
  # Virtually all 4K WEB-DL is HEVC; mild boost for 10-bit color depth
  - name: (TG-S) 10bit
    score: 50

  # --- German language scoring (core preference) ---
  # German DL = Dual Language (Original + German) — the ideal release
  - name: (TG-S) German DL
    score: 10000
  - name: (TG-S) German DL (undefined)
    score: 10000
  # German audio present (German-only without original)
  - name: (TG-S) German
    score: 3000
  # Resolution quality boosts for German releases
  - name: (TG-S) German 2160p Booster
    score: 9000
  - name: (TG-S) German 1080p Booster
    score: 650

  # --- Language penalties (soft preference via scoring) ---
  # Penalise releases missing English audio
  - name: '(TG-S) Language: Not English'
    score: -11000
  # Penalise releases missing the original/native audio
  - name: '(TG-S) Language: Not Original'
    score: -5000

  # --- Audio format scoring (remote streaming optimization) ---
  # Prefer streaming-friendly lossy codecs (low bitrate, no transcoding needed)
  - name: (TG-S) DD+ ATMOS
    score: 550
  - name: (TG-S) DD+
    score: 500
  - name: (TG-S) DD
    score: 300
  # Penalize lossless/high-bitrate audio (large files, transcode on remote playback)
  # TrueHD Atmos 7.1 alone can add 5-10 Mbps to total bitrate
  - name: (TG-S) TrueHD ATMOS
    score: -5000
  - name: (TG-S) TrueHD
    score: -5000
  - name: (TG-S) DTS-HD MA
    score: -5000
  - name: (TG-S) DTS X
    score: -5000
  - name: (TG-S) PCM
    score: -5000
  - name: (TG-S) FLAC
    score: -2000
  # Mild penalty for basic DTS (higher bitrate than DD/DD+ but not lossless)
  - name: (TG-S) DTS
    score: -500

  # --- German release group tiers ---
  - name: (TG-S) German Web Tier 01
    score: 2100
  - name: (TG-S) German Web Tier 02
    score: 1900
  - name: (TG-S) German Web Tier 03
    score: 1800
  - name: (TG-S) German Scene
    score: 1700

  # --- General WEB release group tiers (English/international groups) ---
  - name: (TG-S) WEB Tier 01
    score: 1700
  - name: (TG-S) WEB Tier 02
    score: 1650
  - name: (TG-S) WEB Tier 03
    score: 1600

  # --- Streaming source boost ---
  - name: (TG-S) HD Streaming Boost
    score: 75
  - name: (TG-S) UHD Streaming Boost
    score: 75

  # --- Repack/Proper ---
  - name: (TG-S) Repack&Proper
    score: 5
  - name: (TG-S) Repack2
    score: 6
  - name: (TG-S) Repack3
    score: 7

  # --- HDR preference (4K benefit) ---
  - name: (TG-S) HDR10+ Boost
    score: 1000
  - name: (TG-S) HDR
    score: 500
  - name: (TG-S) HLG
    score: 250
  # --- Smart Dolby Vision ---
  # Boost DV releases (only those with HDR10 fallback survive the ban below)
  - name: (TG-S) DV Boost
    score: 1500
  # Ban DV releases WITHOUT HDR10 fallback — these cause playback issues
  # on non-DV devices and often require transcoding for remote streaming
  - name: (TG-S) DV (w&o HDR fallback)
    score: -35000
  # Ban disk-based DV (not relevant for WEB-only, defense in depth)
  - name: (TG-S) DV (Disk)
    score: -35000
  # Note: (TG-S) Generated Dynamic HDR does not exist as a Sonarr CF —
  # only the Radarr variant (TG-R) exists. Omitted here intentionally.

  # --- Remux ban (remote streaming — too large, 30+ Mbps typical) ---
  # Even though Remux qualities are not in the allowed list, some indexers
  # may tag releases inconsistently. Explicit ban provides defense in depth.
  - name: (TG-S) Remux Tier 01
    score: -35000
  - name: (TG-S) Remux Tier 02
    score: -35000

  # --- Bans (hard reject) ---
  - name: (TG-S) German LQ
    score: -35000
  - name: (TG-S) German LQ (release title)
    score: -35000
  - name: (TG-S) German Microsized
    score: -35000
  - name: (TG-S) BR-DISK
    score: -35000
  - name: (TG-S) LQ
    score: -35000
  - name: (TG-S) LQ (Release Title)
    score: -35000
  - name: (TG-S) Extras
    score: -35000
  - name: (TG-S) AV1
    score: -35000
  - name: (TG-S) Upscaled
    score: -35000
  - name: (TG-S) No-RlsGroup
    score: -35000
  - name: (TG-S) Obfuscated
    score: -35000
  - name: (TG-S) Retags
    score: -35000
  - name: (TG-S) Bad Dual Groups
    score: -35000
  - name: (TG-S) Hardcoded Subs
    score: -35000

