name: Gantles WEB-1080p Streaming
description: >-
  Remote-safe streaming 1080p profile with 7-tier language preference
  and audio format optimization.

  Language preference (upgrade ladder — grabs first available, upgrades upward):
    1. Native + English + German — best, no further upgrade
    2. Native + English — upgrades if German appears
    3. Native + German — upgrades if English appears
    4. English + German — upgrades if Native appears
    5. English only — upgrades when German/Native appears
    6. Native only — upgrades when English/German appears
    7. German only — last resort, upgrades toward any better tier

  Remote streaming bitrate targets:
    - Preferred average bitrate: 6–10 Mbps
    - Soft maximum: 12 Mbps (90 MB/min)
    - Hard maximum: 15 Mbps (112.5 MB/min)
    - Formula: Mbps × 7.5 = MB/min

  - Targets WEB-DL and WEBRip 1080p primarily
  - Falls back to Bluray 1080p when no WEB release exists
  - Strongly prefers German DL (Dual Language: Original + German) releases
  - All language tiers are grabbable; system upgrades automatically
  - Rejects ALL Dolby Vision releases (DV at 1080p is rare and not beneficial)
  - Prefers EAC3/AC3 audio (streaming-friendly, low bitrate)
  - Penalizes TrueHD/DTS-HD MA/DTS:X/PCM (lossless audio = large files, transcode-prone)
  - Netflix-like streaming quality target
  - Average Movie Size: 4-10 GB
  - Average Episode Size: 1-4 GB
tags:
  - 1080p
  - WEB
  - Bluray
  - German
  - Streaming
  - Remote Safe
upgradesAllowed: true
minCustomFormatScore: -15000
upgradeUntilScore: 35000
minScoreIncrement: 1

# ---------------------------------------------------------------------------
# Shared custom formats (applied to both Sonarr and Radarr)
# ---------------------------------------------------------------------------
custom_formats: []

# ---------------------------------------------------------------------------
# Sonarr-specific custom formats
# ---------------------------------------------------------------------------
custom_formats_sonarr:
  # --- Resolution boosters ---
  - name: (TG-S) 1080p
    score: 50
  - name: (TG-S) 720p
    score: 5

  # --- HEVC / 10-bit preference ---
  # x265 at 1080p saves bandwidth — good for remote streaming
  - name: (TG-S) 10bit
    score: 25

  # --- German language scoring (core preference) ---
  # German DL = Dual Language (Original + German) — the ideal release
  - name: (TG-S) German DL
    score: 10000
  - name: (TG-S) German DL (undefined)
    score: 10000
  # German audio present (German-only without original)
  - name: (TG-S) German
    score: 3000
  # 1080p quality boost for German releases
  - name: (TG-S) German 1080p Booster
    score: 650

  # --- Language penalties (soft preference via scoring) ---
  # Penalise releases missing English audio
  - name: '(TG-S) Language: Not English'
    score: -11000
  # Penalise releases missing the original/native audio
  - name: '(TG-S) Language: Not Original'
    score: -5000

  # --- Audio format scoring (remote streaming optimization) ---
  # Prefer streaming-friendly lossy codecs (low bitrate, no transcoding needed)
  - name: (TG-S) DD+ ATMOS
    score: 450
  - name: (TG-S) DD+
    score: 500
  - name: (TG-S) DD
    score: 300
  # Penalize lossless/high-bitrate audio (large files, transcode on remote playback)
  - name: (TG-S) TrueHD ATMOS
    score: -5000
  - name: (TG-S) TrueHD
    score: -5000
  - name: (TG-S) DTS-HD MA
    score: -5000
  - name: (TG-S) DTS X
    score: -5000
  - name: (TG-S) PCM
    score: -5000
  - name: (TG-S) FLAC
    score: -2000
  # Mild penalty for basic DTS (higher bitrate than DD/DD+ but not lossless)
  - name: (TG-S) DTS
    score: -500

  # --- German release group tiers ---
  - name: (TG-S) German Web Tier 01
    score: 2100
  - name: (TG-S) German Web Tier 02
    score: 1900
  - name: (TG-S) German Web Tier 03
    score: 1800
  - name: (TG-S) German Scene
    score: 1700

  # --- German Bluray release group tiers ---
  - name: (TG-S) German Bluray Tier 01
    score: 2900
  - name: (TG-S) German Bluray Tier 02
    score: 2650
  - name: (TG-S) German Bluray Tier 03
    score: 2300

  # --- General WEB release group tiers (English/international groups) ---
  - name: (TG-S) WEB Tier 01
    score: 1700
  - name: (TG-S) WEB Tier 02
    score: 1650
  - name: (TG-S) WEB Tier 03
    score: 1600

  # --- General HD Bluray release group tiers ---
  - name: (TG-S) HD Bluray Tier 01
    score: 1800
  - name: (TG-S) HD Bluray Tier 02
    score: 1750

  # --- Streaming source boost ---
  - name: (TG-S) HD Streaming Boost
    score: 75

  # --- Repack/Proper ---
  - name: (TG-S) Repack&Proper
    score: 5
  - name: (TG-S) Repack2
    score: 6
  - name: (TG-S) Repack3
    score: 7

  # --- Dolby Vision ban (DV at 1080p is rare and not beneficial) ---
  - name: (TG-S) DV Boost
    score: -35000

  # --- Bans (hard reject) ---
  - name: (TG-S) German LQ
    score: -35000
  - name: (TG-S) German LQ (release title)
    score: -35000
  - name: (TG-S) German Microsized
    score: -35000
