    score: 1700
  - name: (TG-S) WEB Tier 02
    score: 1650
  - name: (TG-S) WEB Tier 03
    score: 1600

  # --- Streaming source boost ---
  - name: (TG-S) HD Streaming Boost
    score: 75

  # --- Repack/Proper ---
  - name: (TG-S) Repack&Proper
    score: 5
  - name: (TG-S) Repack2
    score: 6
  - name: (TG-S) Repack3
    score: 7

  # --- Bans (hard reject) ---
