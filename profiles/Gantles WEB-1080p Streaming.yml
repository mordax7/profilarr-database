name: Gantles WEB-1080p Streaming
description: >-
  Streaming-quality 1080p WEB-only profile with tiered language preference.

  Language preference (upgrade ladder):
    1. Native (Original) + English + German DL — best, no further upgrade
    2. English + German — great, upgrades if DL appears
    3. English-only — acceptable, upgrades when German becomes available
    4. Non-English — rejected

  - Targets WEB-DL and WEBRip 1080p only (no Bluray, no Remux)
  - Strongly prefers German DL (Dual Language: Original + German) releases
  - English-only releases are grabbed and upgraded when German DL is available
  - Rejects releases without English audio
  - Netflix-like streaming quality target
  - Average Movie Size: 4-10 GB
  - Average Episode Size: 1-4 GB
tags:
  - 1080p
  - WEB
  - German
  - Streaming
upgradesAllowed: true
minCustomFormatScore: 0
upgradeUntilScore: 35000
minScoreIncrement: 1

# ---------------------------------------------------------------------------
# Shared custom formats (applied to both Sonarr and Radarr)
# ---------------------------------------------------------------------------
custom_formats: []

# ---------------------------------------------------------------------------
# Sonarr-specific custom formats
# ---------------------------------------------------------------------------
custom_formats_sonarr:
  # --- Resolution boosters ---
  - name: (TG-S) 1080p
    score: 50
  - name: (TG-S) 720p
    score: 5

  # --- German language scoring (core preference) ---
  # German DL = Dual Language (Original + German) — the ideal release
  - name: (TG-S) German DL
    score: 11000
  - name: (TG-S) German DL (undefined)
    score: 11000
  # German audio present (may be German-only without original)
  - name: (TG-S) German
    score: 10000
  # 1080p quality boost for German releases
  - name: (TG-S) German 1080p Booster
    score: 650

  # --- Language rejection ---
  # Reject releases that do not contain English audio
  - name: (TG-S) Language: Not English
    score: -10000

  # --- German release group tiers ---
  - name: (TG-S) German Web Tier 01
    score: 2100
  - name: (TG-S) German Web Tier 02
    score: 1900
  - name: (TG-S) German Web Tier 03
    score: 1800
  - name: (TG-S) German Scene
    score: 1700

  # --- General WEB release group tiers (English/international groups) ---
