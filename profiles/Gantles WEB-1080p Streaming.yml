name: Gantles WEB-1080p Streaming
description: >-
  Streaming-quality 1080p WEB-only profile with 7-tier language preference.

  Language preference (upgrade ladder — grabs first available, upgrades upward):
    1. Native + English + German — best, no further upgrade
    2. Native + English — upgrades if German appears
    3. Native + German — upgrades if English appears
    4. English + German — upgrades if Native appears
    5. English only — upgrades when German/Native appears
    6. Native only — upgrades when English/German appears
    7. German only — last resort, upgrades toward any better tier

  - Targets WEB-DL and WEBRip 1080p only (no Bluray, no Remux)
  - Strongly prefers German DL (Dual Language: Original + German) releases
  - All language tiers are grabbable; system upgrades automatically
  - Netflix-like streaming quality target
  - Average Movie Size: 4-10 GB
  - Average Episode Size: 1-4 GB
tags:
  - 1080p
  - WEB
  - German
  - Streaming
upgradesAllowed: true
minCustomFormatScore: -15000
upgradeUntilScore: 35000
minScoreIncrement: 1

# ---------------------------------------------------------------------------
# Shared custom formats (applied to both Sonarr and Radarr)
# ---------------------------------------------------------------------------
custom_formats: []

# ---------------------------------------------------------------------------
# Sonarr-specific custom formats
# ---------------------------------------------------------------------------
custom_formats_sonarr:
  # --- Resolution boosters ---
  - name: (TG-S) 1080p
    score: 50
  - name: (TG-S) 720p
    score: 5

  # --- German language scoring (core preference) ---
  # German DL = Dual Language (Original + German) — the ideal release
  - name: (TG-S) German DL
    score: 10000
  - name: (TG-S) German DL (undefined)
    score: 10000
  # German audio present (German-only without original)
  - name: (TG-S) German
    score: 3000
  # 1080p quality boost for German releases
  - name: (TG-S) German 1080p Booster
    score: 650

  # --- Language penalties (soft preference via scoring) ---
  # Penalise releases missing English audio
  - name: '(TG-S) Language: Not English'
    score: -11000
  # Penalise releases missing the original/native audio
  - name: '(TG-S) Language: Not Original'
    score: -5000

  # --- German release group tiers ---
  - name: (TG-S) German Web Tier 01
    score: 2100
  - name: (TG-S) German Web Tier 02
    score: 1900
  - name: (TG-S) German Web Tier 03
    score: 1800
  - name: (TG-S) German Scene
    score: 1700

  # --- General WEB release group tiers (English/international groups) ---
